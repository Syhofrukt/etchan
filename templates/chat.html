<script>
    document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("message_form");
        const socket = new WebSocket("wss://" + window.location.host + "/ws/chat");

        async function validateForm(event) {
            const text = document.getElementById('messageText').value.trim();
            const textArea = document.getElementById('messageText');
            const image = document.getElementById('file-upload').files[0];

            if (!text && !image) {
                event.preventDefault();
                

                textArea.value = '';
                textArea.placeholder = 'Type a message...';
                textArea.style.borderColor = 'red';
                textArea.style.borderWidth = '2px';

                setTimeout(() => {
                    textArea.placeholder = 'Type a message...';
                    textArea.style.borderColor = '';
                    textArea.style.borderWidth = '1px';
                }, 3000);

                return false;
            }
            return true;
        }   


        // Обработка сообщений от сервера
        socket.onmessage = function(event) {
            if (event.data === "new_message") {
                fetchMessages();
            }
        };
        
        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const isValid = await validateForm(e);
            if (!isValid) return;

            const formData = new FormData(form);

            const response = await fetch("/send_message", {
                method: "POST",
                body: formData
            });

            fetchMessages();
        });

        async function fetchMessages() {
            const formData = new FormData(form);
            const response = await fetch("/get_messages", {
                method: "POST",
                body: formData
            });

            const html = await response.text();
            document.getElementById("message_list").innerHTML = html;
            form.reset();
        }
    }); 
</script>
